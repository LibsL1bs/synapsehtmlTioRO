<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse • Perfil</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="flex h-screen w-full overflow-hidden surface-0">
      <aside class="h-screen flex flex-col border-r border-border surface-1 transition-all duration-200 ease-out z-50 shrink-0" style="width: 180px;">
        <div class="h-12 flex items-center justify-center border-b border-border">
          <div class="flex items-center gap-2">
            <img src="../synapse.svg" alt="Synapse" class="syn-logo syn-logo-md" />
            <span class="text-xs font-bold text-foreground tracking-[0.2em] uppercase font-mono">SYNAPSE</span>
          </div>
        </div>
        <nav class="flex-1 flex flex-col gap-0.5 p-1.5 mt-1 overflow-y-auto">
          <button data-route="dashboard" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Dashboard</span></button>
          <button data-route="dados" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Dados</span></button>
          <button data-route="perfil" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer surface-3 text-foreground"><div class="absolute left-0 top-1/2 -translate-y-1/2 w-[2px] h-6 bg-alert rounded-r-sm"></div><span class="text-xs font-medium whitespace-nowrap tracking-wide">Perfil</span></button>
          <button data-route="metricas" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Métricas</span></button>
          <button data-route="educacional" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Educacional</span></button>
          <button data-route="treinos" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Treinos</span></button>
          <div class="my-2 px-2" data-admin-only><div class="tech-divider"></div><span class="text-[8px] font-mono text-muted-foreground/50 tracking-[0.25em] uppercase mt-1 block">ADMIN</span></div>
          <button data-route="adminSistema" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Sistema</span></button>
          <button data-route="adminUsuarios" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Usuários</span></button>
          <button data-route="adminLogs" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Logs IA</span></button>
          <button data-route="adminTestes" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Testes</span></button>
          <button data-route="adminDados" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Dados</span></button>
        </nav>
        <div class="p-1.5 border-t border-border">
          <div class="flex items-center justify-center mb-1.5"><div class="w-1.5 h-1.5 rounded-full bg-success"></div><span class="ml-2 text-[10px] text-muted-foreground font-mono uppercase tracking-wider">Online</span></div>
          <button id="logout-btn" class="w-full flex items-center gap-3 px-3 py-2 rounded-sm text-muted-foreground/60 hover:text-alert hover:surface-2 transition-all duration-150 cursor-pointer"><span class="text-xs font-medium whitespace-nowrap tracking-wide">Sair</span></button>
        </div>
      </aside>

      <main class="flex-1 overflow-y-auto p-5 space-y-4 max-w-5xl mx-auto animate-fade-in">
        <div class="pb-3 border-b border-border">
          <h1 class="text-lg font-bold text-foreground uppercase tracking-wide">Perfil</h1>
          <p class="text-[10px] text-muted-foreground mt-0.5 font-mono tracking-wider">GERENCIAMENTO DE CONTA DO ATLETA</p>
        </div>

        <div class="surface-2 border border-border p-5 panel-shadow">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 border border-border flex items-center justify-center surface-3">
              <span class="text-2xl text-muted-foreground">◉</span>
            </div>
            <div>
              <span class="text-sm font-bold font-mono text-foreground" id="perfil-display-name"></span>
              <span class="block text-[10px] text-muted-foreground font-mono tracking-wider mt-0.5" id="perfil-display-email"></span>
            </div>
          </div>
        </div>

        <div class="surface-2 border border-border p-5 panel-shadow space-y-4">
          <div class="flex items-center gap-2 pb-2 border-b border-border">
            <span class="text-[10px] font-mono text-muted-foreground tracking-[0.2em] uppercase">Informações Pessoais</span>
          </div>
          <form id="perfil-form" class="space-y-3">
            <div>
              <label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1">NOME</label>
              <input name="nome" class="w-full h-9 border border-border px-3 text-xs text-foreground focus:outline-none focus:border-alert/50 transition-colors font-mono" style="background-color:hsl(var(--surface-1));" />
            </div>
            <div>
              <label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1">EMAIL</label>
              <input name="email" type="email" class="w-full h-9 border border-border px-3 text-xs text-foreground focus:outline-none focus:border-alert/50 transition-colors font-mono" style="background-color:hsl(var(--surface-1));" />
            </div>
            <div class="grid grid-cols-3 gap-3">
              <div><label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1">SENHA ATUAL</label><input name="currentPassword" type="password" class="w-full h-9 border border-border px-3 text-xs text-foreground focus:outline-none focus:border-alert/50 transition-colors font-mono" style="background-color:hsl(var(--surface-1));" /></div>
              <div><label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1">NOVA SENHA</label><input name="newPassword" type="password" class="w-full h-9 border border-border px-3 text-xs text-foreground focus:outline-none focus:border-alert/50 transition-colors font-mono" style="background-color:hsl(var(--surface-1));" /></div>
              <div><label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1">CONFIRMAR</label><input name="confirmPassword" type="password" class="w-full h-9 border border-border px-3 text-xs text-foreground focus:outline-none focus:border-alert/50 transition-colors font-mono" style="background-color:hsl(var(--surface-1));" /></div>
            </div>
            <div id="perfil-error" class="text-xs text-red-500 font-mono"></div>
            <div id="perfil-ok" class="text-xs text-green-600 font-mono"></div>
            <div class="flex flex-wrap items-center gap-2">
              <button type="submit" class="text-[10px] font-mono tracking-[0.2em] bg-foreground text-background px-4 py-2 hover:bg-foreground/90 transition-colors">SALVAR</button>
              <button id="perfil-delete-btn" type="button" class="text-[10px] font-mono tracking-[0.2em] bg-alert text-background px-4 py-2 hover:opacity-90 transition-opacity">DELETAR</button>
            </div>
          </form>
        </div>
      </main>

      <aside class="h-screen flex flex-col border-l border-border shrink-0" style="background:hsl(var(--chat-background)); width:300px;">
        <div class="h-12 flex items-center justify-between px-3 border-b border-border"><div class="flex items-center gap-2"><span class="text-[10px] font-medium text-muted-foreground uppercase tracking-[0.15em] font-mono">Assistente</span></div></div>
        <div class="flex-1 overflow-y-auto p-3 space-y-3" id="chat-log"></div>
        <div class="p-2 border-t border-border">
          <form id="chat-form" class="flex items-center gap-2 rounded-sm px-3 py-1.5 border border-border" style="background:hsl(var(--chat-input));">
            <input name="pergunta" type="text" placeholder="Pergunte ao assistente..." class="flex-1 bg-transparent text-xs text-foreground placeholder:text-muted-foreground outline-none font-mono" />
            <button type="submit" class="p-1 rounded-sm hover:surface-3 text-muted-foreground hover:text-foreground transition-colors">Enviar</button>
          </form>
        </div>
      </aside>
    </div>
    <script type="module" src="./script.js"></script>
  </body>
</html>
