<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Synapse • Registro</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body class="min-h-screen flex bg-background">
    <div class="syn-auth-grid w-full">
      <div class="syn-auth-left">
        <div class="absolute inset-0 syn-auth-mesh"></div>
        <div class="absolute inset-0 bg-gradient-to-r from-transparent to-background/60"></div>
      </div>

      <div class="syn-auth-right">
        <div class="syn-auth-form">
          <div class="mb-8">
            <div class="flex items-center gap-2 mb-6">
              <img src="../synapse.svg" alt="Synapse" class="syn-logo syn-logo-sm lg:hidden" />
              <span class="text-[10px] font-mono text-muted-foreground tracking-[0.25em] uppercase">SYNAPSE</span>
            </div>
            <h1 class="text-xl font-display font-bold tracking-tight mb-1">Criar Conta</h1>
            <p class="text-xs text-muted-foreground font-mono tracking-wider">SYSTEM_ACCOUNT_CREATION</p>
          </div>

          <form id="register-form" class="space-y-4">
            <div id="register-error" class="text-xs text-red-500 font-mono mb-2"></div>
            <div id="register-ok" class="text-xs text-green-600 font-mono mb-2"></div>

            <div>
              <label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1.5">NOME DO ATLETA</label>
              <input name="name" type="text" placeholder="Identificação" class="w-full h-10 bg-surface-1 border border-border px-3 text-sm text-foreground placeholder:text-muted-foreground/40 focus:outline-none focus:border-alert/50 transition-colors font-mono" style="background-color:hsl(var(--surface-1));" />
            </div>

            <div>
              <label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1.5">EMAIL</label>
              <input name="email" type="email" placeholder="atleta@synapse.io" class="w-full h-10 bg-surface-1 border border-border px-3 text-sm text-foreground placeholder:text-muted-foreground/40 focus:outline-none focus:border-alert/50 transition-colors font-mono" style="background-color:hsl(var(--surface-1));" />
            </div>

            <div>
              <label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1.5">SENHA</label>
              <input name="password" type="password" placeholder="••••••••" class="w-full h-10 bg-surface-1 border border-border px-3 text-sm text-foreground placeholder:text-muted-foreground/40 focus:outline-none focus:border-alert/50 transition-colors font-mono" style="background-color:hsl(var(--surface-1));" />
            </div>

            <div>
              <label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1.5">CONFIRMAR SENHA</label>
              <input name="confirm" type="password" placeholder="••••••••" class="w-full h-10 bg-surface-1 border border-border px-3 text-sm text-foreground placeholder:text-muted-foreground/40 focus:outline-none focus:border-alert/50 transition-colors font-mono" style="background-color:hsl(var(--surface-1));" />
            </div>

            <button type="submit" class="w-full flex items-center justify-center gap-2 h-10 bg-alert text-alert-foreground text-xs font-mono tracking-[0.2em] hover:bg-alert/90 transition-colors mt-6">CRIAR CONTA</button>
          </form>

          <div class="mt-6 pt-4 border-t border-border/50">
            <p class="text-[10px] text-muted-foreground font-mono text-center">
              Já possui conta?
              <button data-route="login" class="text-foreground hover:text-alert transition-colors">INICIAR SESSÃO</button>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
