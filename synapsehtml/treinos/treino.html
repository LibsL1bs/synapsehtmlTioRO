<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse • Treinos</title>
  <link rel="stylesheet" href="./treino.css" />
</head>

<body>
  <div class="flex h-screen w-full overflow-hidden surface-0">

    <!-- ── Nav sidebar ───────────────────────────────────────────────────── -->
    <aside class="h-screen flex flex-col border-r border-border surface-1 transition-all duration-200 ease-out z-50 shrink-0" style="width:180px">
      <div class="h-12 flex items-center justify-center border-b border-border">
        <div class="flex items-center gap-2">
          <img src="../synapse.svg" alt="Synapse" class="syn-logo syn-logo-md" />
          <span class="text-xs font-bold text-foreground tracking-[0.2em] uppercase font-mono">SYNAPSE</span>
        </div>
      </div>
      <nav class="flex-1 flex flex-col gap-0.5 p-1.5 mt-1 overflow-y-auto">
        <button data-route="dashboard" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Dashboard</span>
        </button>
        <button data-route="dados" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Dados</span>
        </button>
        <button data-route="perfil" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Perfil</span>
        </button>
        <button data-route="metricas" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Métricas</span>
        </button>
        <button data-route="educacional" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Educacional</span>
        </button>
        <button data-route="treinos" class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer surface-3 text-foreground">
          <div class="absolute left-0 top-1/2 -translate-y-1/2 w-[2px] h-6 bg-alert rounded-r-sm"></div>
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Treinos</span>
        </button>
        <div class="my-2 px-2" data-admin-only>
          <div class="tech-divider"></div>
          <span class="text-[8px] font-mono text-muted-foreground/50 tracking-[0.25em] uppercase mt-1 block">ADMIN</span>
        </div>
        <button data-route="adminSistema" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Sistema</span>
        </button>
        <button data-route="adminUsuarios" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Usuários</span>
        </button>
        <button data-route="adminLogs" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Logs IA</span>
        </button>
        <button data-route="adminTestes" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Testes</span>
        </button>
        <button data-route="adminDados" data-admin-only class="relative flex items-center gap-3 px-3 py-2 rounded-sm transition-all duration-150 cursor-pointer text-muted-foreground hover:text-foreground hover:surface-2">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Dados</span>
        </button>
      </nav>
      <div class="p-1.5 border-t border-border">
        <div class="flex items-center justify-center mb-1.5">
          <div class="w-1.5 h-1.5 rounded-full bg-success"></div>
          <span class="ml-2 text-[10px] text-muted-foreground font-mono uppercase tracking-wider">Online</span>
        </div>
        <button id="logout-btn" class="w-full flex items-center gap-3 px-3 py-2 rounded-sm text-muted-foreground/60 hover:text-alert hover:surface-2 transition-all duration-150 cursor-pointer">
          <span class="text-xs font-medium whitespace-nowrap tracking-wide">Sair</span>
        </button>
      </div>
    </aside>

    <!-- ── Split: list panel + detail panel ─────────────────────────────── -->
    <div class="flex flex-1 overflow-hidden">

      <!-- History sidebar -->
      <div class="h-full flex flex-col border-r border-border surface-1 shrink-0" style="width:220px">
        <div class="h-12 flex items-center justify-center border-b border-border">
          <span class="text-[10px] font-mono tracking-[0.2em] uppercase text-muted-foreground">Histórico</span>
        </div>
        <div class="flex-1 overflow-y-auto p-1.5 min-h-0" id="history-list">
          <div class="text-[10px] text-muted-foreground font-mono text-center py-4">Nenhum treino registrado</div>
        </div>
      </div>

      <!-- Detail panel -->
      <main class="flex-1 overflow-y-auto p-5">
        <div class="pb-3 border-b border-border mb-4 flex items-center justify-between gap-4">
          <div>
            <h1 class="text-lg font-bold text-foreground uppercase tracking-wide">Treinos</h1>
            <p class="text-[10px] text-muted-foreground mt-0.5 font-mono tracking-wider">Histórico e criação em tempo real</p>
          </div>
          <button id="btn-open-create" class="text-[10px] font-mono font-bold px-3 py-2 rounded-sm cursor-pointer" style="background:hsl(var(--alert));color:#fff">+ Novo Treino</button>
        </div>

        <div id="detail-section" class="space-y-4">
          <div id="empty-state" class="surface-2 rounded-sm border border-border p-8 text-center panel-shadow">
            <p class="text-xs text-muted-foreground font-mono">Selecione um treino no histórico ao lado ou crie um novo.</p>
          </div>
          <div id="training-detail" class="syn-hidden"></div>
        </div>

        <div id="create-view" class="syn-hidden mt-4 space-y-4">
          <div class="surface-2 rounded-sm border border-border p-4 panel-shadow">
            <div class="grid gap-3" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">
              <div>
                <label class="text-[10px] text-muted-foreground uppercase tracking-[0.15em] font-mono block mb-1">Nome</label>
                <input id="create-name" type="text" class="w-full bg-transparent border border-border rounded-sm px-3 py-1.5 text-xs text-foreground font-mono" />
              </div>
              <div>
                <label class="text-[10px] text-muted-foreground uppercase tracking-[0.15em] font-mono block mb-1">Data</label>
                <input id="create-date" type="date" class="w-full bg-transparent border border-border rounded-sm px-3 py-1.5 text-xs text-foreground font-mono" />
              </div>
            </div>
          </div>

          <div class="surface-2 rounded-sm border border-border p-4 panel-shadow">
            <div class="flex items-center justify-between gap-2">
              <h3 class="text-[10px] font-semibold text-muted-foreground uppercase tracking-[0.15em] font-mono">Exercícios</h3>
              <button id="btn-add-exercise" class="text-[10px] font-mono px-3 py-1.5 rounded-sm border border-border text-muted-foreground hover:text-foreground hover:surface-3 cursor-pointer">+ Adicionar exercício</button>
            </div>
            <div id="create-exercises" class="space-y-3 mt-4">
              <p class="text-[11px] text-muted-foreground font-mono">Nenhum exercício adicionado.</p>
            </div>
          </div>

          <div class="flex items-center justify-end gap-2">
            <button id="btn-cancel-create" class="text-[10px] font-mono px-4 py-2 rounded-sm border border-border text-muted-foreground hover:text-foreground hover:surface-3 cursor-pointer">Cancelar</button>
            <button id="btn-save-create" class="text-[10px] font-mono font-bold px-4 py-2 rounded-sm cursor-pointer" style="background:hsl(var(--alert));color:#fff">Salvar treino</button>
          </div>
        </div>
      </main>
    </div>

    <!-- ── Chat sidebar ───────────────────────────────────────────────────── -->
    <aside class="h-screen flex flex-col border-l border-border shrink-0" style="background:hsl(var(--chat-background));width:300px">
      <div class="h-12 flex items-center px-3 border-b border-border">
        <span class="text-[10px] font-medium text-muted-foreground uppercase tracking-[0.15em] font-mono">Assistente</span>
      </div>
      <div class="flex-1 overflow-y-auto p-3 space-y-3" id="chat-log"></div>
      <div class="p-2 border-t border-border">
        <form id="chat-form" class="flex items-center gap-2 rounded-sm px-3 py-1.5 border border-border" style="background:hsl(var(--chat-input))">
          <input name="pergunta" type="text" placeholder="Pergunte ao assistente..." class="flex-1 bg-transparent text-xs text-foreground placeholder:text-muted-foreground outline-none font-mono" />
          <button type="submit" class="p-1 rounded-sm hover:surface-3 text-muted-foreground hover:text-foreground transition-colors text-xs cursor-pointer">Enviar</button>
        </form>
      </div>
    </aside>
  </div>

  <!-- ── Modal: seleção de exercício ─────────────────────────────────────── -->
  <div id="exercise-overlay" class="fixed inset-0 z-50 items-center justify-center syn-hidden" style="display:none;background:rgba(0,0,0,0.6)">
    <div class="surface-2 rounded-sm border border-border p-5 panel-shadow-lg" style="width:100%;max-width:420px">
      <div class="flex items-center justify-between mb-4 pb-2 border-b border-border">
        <h3 class="text-xs font-semibold text-foreground uppercase tracking-[0.15em] font-mono">Selecionar exercício</h3>
        <button id="exercise-close" class="text-muted-foreground hover:text-foreground text-xl leading-none cursor-pointer">×</button>
      </div>
      <div class="space-y-3">
        <div class="grid gap-2" style="grid-template-columns:repeat(auto-fit,minmax(120px,1fr))">
          <button data-exercise-option="Supino Reto" class="text-[10px] font-mono px-2 py-1.5 rounded-sm border border-border text-muted-foreground hover:surface-3">Supino Reto</button>
          <button data-exercise-option="Agachamento" class="text-[10px] font-mono px-2 py-1.5 rounded-sm border border-border text-muted-foreground hover:surface-3">Agachamento</button>
          <button data-exercise-option="Terra" class="text-[10px] font-mono px-2 py-1.5 rounded-sm border border-border text-muted-foreground hover:surface-3">Terra</button>
          <button data-exercise-option="Remada" class="text-[10px] font-mono px-2 py-1.5 rounded-sm border border-border text-muted-foreground hover:surface-3">Remada</button>
        </div>
        <div>
          <label class="text-[10px] text-muted-foreground uppercase tracking-[0.15em] font-mono block mb-1">Outro exercício</label>
          <input id="exercise-name-input" type="text" class="w-full bg-transparent border border-border rounded-sm px-3 py-1.5 text-xs text-foreground font-mono" placeholder="Digite um nome" />
        </div>
        <div class="flex items-center justify-end gap-2">
          <button id="exercise-cancel" class="text-[10px] font-mono px-3 py-1.5 rounded-sm border border-border text-muted-foreground hover:text-foreground hover:surface-3 cursor-pointer">Cancelar</button>
          <button id="exercise-confirm" class="text-[10px] font-mono font-bold px-3 py-1.5 rounded-sm cursor-pointer" style="background:hsl(var(--alert));color:#fff">Adicionar</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./treino.js"></script>
</body>

</html>
