<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Synapse • Login</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body class="min-h-screen flex bg-background">
  <div class="syn-auth-grid w-full">
    <div class="syn-auth-left">
      <div class="absolute inset-0 syn-auth-mesh"></div>
      <div class="absolute inset-0 bg-gradient-to-r from-transparent to-background/60"></div>
    </div>

    <div class="syn-auth-right">
      <div class="syn-auth-form">
        <div class="mb-8">
          <div class="flex items-center gap-2 mb-6">
            <img src="../synapse.svg" alt="Synapse" class="syn-logo syn-logo-sm lg:hidden" />
            <span class="text-[10px] font-mono text-muted-foreground tracking-[0.25em] uppercase">SYNAPSE</span>
          </div>
          <h1 class="text-xl font-display font-bold tracking-tight mb-1">Iniciar Sessão</h1>
          <p class="text-xs text-muted-foreground font-mono tracking-wider">SYSTEM_ACCESS_REQUIRED</p>
        </div>

        <div class="flex items-center gap-2 border border-border px-3 py-2 mb-6">
          <div class="w-1.5 h-1.5 rounded-full bg-success animate-pulse"></div>
          <span class="text-[10px] font-mono text-muted-foreground tracking-[0.15em]">SECURE_CONNECTION — READY</span>
        </div>

        <form id="login-form" class="space-y-4" novalidate>
          <div id="login-error" class="text-xs font-mono mb-2"
            style="display:none;color:#ff4d4f;background:rgba(255,77,79,0.08);border:1px solid rgba(255,77,79,0.35);padding:8px 10px;">
          </div>

          <div>
            <label
              class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1.5">IDENTIFICADOR</label>
            <input name="email" type="email" placeholder="atleta@synapse.io"
              class="w-full h-10 border border-border px-3 text-sm text-foreground placeholder:text-muted-foreground/40 focus:outline-none focus:border-alert/50 transition-colors font-mono"
              style="background-color:hsl(var(--surface-1));" />
          </div>

          <div>
            <label class="block text-[10px] font-mono text-muted-foreground tracking-[0.2em] mb-1.5">SENHA</label>
            <input name="password" type="password" placeholder="••••••••"
              class="w-full h-10 border border-border px-3 text-sm text-foreground placeholder:text-muted-foreground/40 focus:outline-none focus:border-alert/50 transition-colors font-mono"
              style="background-color:hsl(var(--surface-1));" />
          </div>

          <label class="flex items-center gap-2 cursor-pointer group">
            <input name="persist" type="checkbox" class="w-3.5 h-3.5" />
            <span
              class="text-[10px] font-mono text-muted-foreground tracking-wider group-hover:text-foreground transition-colors">PERSISTIR
              SESSÃO</span>
          </label>

          <button type="submit"
            class="w-full flex items-center justify-center gap-2 h-10 bg-foreground text-background text-xs font-mono tracking-[0.2em] hover:bg-foreground/90 transition-colors mt-2">INICIAR
            SESSÃO</button>
        </form>

        <div class="mt-6 pt-4 border-t border-border/50">
          <p class="text-[10px] text-muted-foreground font-mono text-center">
            Sem conta?
            <button data-route="registro" class="text-foreground hover:text-alert transition-colors">CRIAR
              CONTA</button>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="./script.js?v=5"></script>
</body>

</html>
